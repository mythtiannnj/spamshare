

<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Share Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="https://i.imgur.com/zi15QL3.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/zi15QL3.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E1A34">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: {
                        primary: '#8B5CF6',
                        'primary-darker': '#7C3AED',
                        'text-main': '#E5E7EB',
                        'text-muted': '#9CA3AF',
                        'bg-container': '#1E1A34',
                        'bg-card': 'rgba(43, 42, 62, 0.7)',
                        'border-color': 'rgba(139, 92, 246, 0.15)',
                        'input-bg': 'rgba(43, 42, 62, 0.5)',
                        'input-border': 'rgba(139, 92, 246, 0.3)',
                        'nav-bg': 'rgba(30, 26, 52, 0.95)',
                        'nav-border': 'rgba(139, 92, 246, 0.2)',
                        'modal-bg': '#2a2744',
                        'success-bg': '#166534',
                        'success-text': '#dcfce7',
                        'error-bg': '#991b1b',
                        'error-text': '#fee2e2',
                        'info-bg': 'rgba(139, 92, 246, 0.1)',
                        'info-text': '#d8b4fe',
                        'server-item-bg-hover': 'rgba(139, 92, 246, 0.1)',
                        'status-active': '#22c55e',
                        'status-offline': '#ef4444',
                    },
                    boxShadow: {
                        'primary-glow': '0 0 15px rgba(139, 92, 246, 0.3)',
                        'card': '0 5px 20px rgba(0, 0, 0, 0.2)',
                    }
                },
            },
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #1E1A34; color: #E5E7EB; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 3px; }
        
        .content-section { display: none; animation: fadeIn 0.3s ease-out; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal { display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.75); z-index: 1050; justify-content: center; align-items: center; padding: 1rem; }
        .modal-content { padding: 1.75rem; border-radius: 16px; background-color: #2a2744; border: 1px solid rgba(139, 92, 246, 0.3); text-align: center; min-width: 300px; max-width: 90%; }
        .modal-content.success { border-left: 5px solid #22c55e; background-color: #166534; color: #dcfce7; }
        .modal-content.error { border-left: 5px solid #ef4444; background-color: #991b1b; color: #fee2e2; }
        
        /* live console styles */
        .console-box {
            background: #0F0D1C;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            height: 220px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }
        .log-entry {
            padding: 4px 8px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: baseline;
        }
        .log-time { color: #9CA3AF; font-size: 10px; font-family: monospace; }
        .log-badge { font-weight: 600; font-size: 9px; padding: 2px 6px; border-radius: 20px; }
        .log-badge.success { background: #166534; color: #bbf7d0; }
        .log-badge.error { background: #991b1b; color: #fee2e2; }
        .log-badge.share { background: #8B5CF6; color: white; }
        .log-badge.system { background: #1E3A8A; color: #93c5fd; }
        .log-message { color: #E5E7EB; word-break: break-word; }
        
        .progress-bar-bg { background: #2D2A4A; border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #8B5CF6, #A855F7); height: 100%; width: 0%; transition: width 0.2s; }
        
        .nav-item { transition: color 0.2s; }
        .nav-indicator { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
        #side-menu.open { transform: translateX(0); }
        #menu-overlay { transition: opacity 0.3s; }
    </style>
</head>

<body class="bg-bg-container text-text-main font-poppins">
    <div class="max-w-md mx-auto min-h-screen pb-20 bg-bg-container shadow-lg flex flex-col relative overflow-x-hidden">

        <!-- Header (original design) -->
        <header class="p-4 border-b bg-nav-bg border-nav-border sticky top-0 z-40 backdrop-blur-md shadow-header">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                   <img src="https://i.imgur.com/zi15QL3.png" alt="Logo" class="w-8 h-8 bg-primary p-1 rounded-lg">
                   <h1 class="text-xl font-semibold text-inherit">Share Boost</h1>
                   <span class="text-xs font-medium text-primary bg-primary/10 px-2 py-0.5 rounded-full">v3.0</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="menu-button" class="text-text-muted hover:text-primary transition-colors">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-5">
            <div class="content-sections">
                
                <section id="home-section" class="content-section active">
                    <form id="share-boost-form" class="space-y-5 mt-5">
                        <div>
                            <label class="text-sm font-medium text-text-muted mb-1.5 block flex items-center gap-1.5">
                                <i data-lucide="cookie" class="w-4 h-4 text-primary"></i> Facebook cookie:
                            </label>
                            <textarea id="cookies" rows="3" class="w-full p-3 rounded-lg border bg-input-bg border-input-border text-text-main placeholder-text-muted focus:outline-none focus:border-primary transition-all text-sm" placeholder="Paste your Facebook cookie here..." required></textarea>
                        </div>
                        <div>
                            <label class="text-sm font-medium text-text-muted mb-1.5 block flex items-center gap-1.5">
                                <i data-lucide="link" class="w-4 h-4 text-primary"></i> Post Link:
                            </label>
                            <input type="url" id="urls" class="w-full p-3 rounded-lg border bg-input-bg border-input-border text-text-main focus:outline-none focus:border-primary transition-all text-sm" placeholder="https://www.facebook.com/..." required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm font-medium text-text-muted mb-1.5 block flex items-center gap-1.5">
                                    <i data-lucide="hash" class="w-4 h-4 text-primary"></i> Share Limit:
                                </label>
                                <input type="number" id="amounts" class="w-full p-3 rounded-lg border bg-input-bg border-input-border text-text-main focus:outline-none focus:border-primary transition-all text-sm" placeholder="e.g., 50" min="1" value="50" required>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-text-muted mb-1.5 block flex items-center gap-1.5">
                                    <i data-lucide="timer" class="w-4 h-4 text-primary"></i> Delay (sec):
                                </label>
                                <input type="number" id="intervals" class="w-full p-3 rounded-lg border bg-input-bg border-input-border text-text-main focus:outline-none focus:border-primary transition-all text-sm" placeholder="e.g., 5" min="0" value="2" required>
                            </div>
                        </div>
                        
                        <!-- New API Server Status (single endpoint) -->
                        <div class="bg-info-bg rounded-xl border border-info-border p-3 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <i data-lucide="server" class="w-4 h-4 text-primary"></i>
                                <span class="text-sm font-medium">Boost Engine</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-status-active animate-pulse"></span>
                                <span class="text-xs text-info-text">Live</span>
                            </div>
                        </div>
                        
                        <!-- Progress Bar (dynamic) -->
                        <div id="progress-area" class="hidden space-y-2">
                            <div class="progress-bar-bg"><div id="progress-fill" class="progress-fill"></div></div>
                            <div class="flex justify-between text-xs"><span id="progress-percent">0%</span><span id="progress-status">0 / 0 shares</span></div>
                        </div>
                        
                        <!-- Stats Cards -->
                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-bg-card rounded-xl p-2 text-center border border-border-color">
                                <div class="text-2xl font-bold text-primary" id="stat-done">0</div>
                                <div class="text-[11px] text-text-muted">Sent</div>
                            </div>
                            <div class="bg-bg-card rounded-xl p-2 text-center border border-border-color">
                                <div class="text-2xl font-bold text-primary" id="stat-total">0</div>
                                <div class="text-[11px] text-text-muted">Target</div>
                            </div>
                            <div class="bg-bg-card rounded-xl p-2 text-center border border-border-color">
                                <div class="text-2xl font-bold text-red-400" id="stat-failed">0</div>
                                <div class="text-[11px] text-text-muted">Failed</div>
                            </div>
                        </div>
                        
                        <button type="submit" id="submit-button" class="w-full bg-primary text-white py-3 rounded-lg font-semibold text-base hover:bg-primary-darker transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed shadow-md shadow-primary/30">
                            <span class="button-icon"><i data-lucide="zap" class="w-5 h-5"></i></span>
                            <span class="button-text">Start Boosting</span>
                        </button>
                    </form>
                    
                    <!-- LIVE CONSOLE (new) -->
                    <div class="mt-6">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-sm font-medium text-text-muted flex items-center gap-1.5">
                                <i data-lucide="terminal" class="w-4 h-4 text-primary"></i> Live Console
                            </label>
                            <button id="clear-console" class="text-xs text-text-muted hover:text-primary transition">clear</button>
                        </div>
                        <div id="live-console" class="console-box">
                            <div class="text-center text-text-muted py-6 text-xs" id="console-placeholder">✨ Ready — start boosting to see logs</div>
                        </div>
                        <div class="text-right text-[10px] text-text-muted mt-1"><span id="log-counter">0</span> events</div>
                    </div>
                </section>

                <!-- TUTORIAL & NOTIFICATIONS REMOVED (hidden but structure kept to avoid errors) -->
                <section id="tutorial-section" class="content-section"></section>
                <section id="notifications-section" class="content-section"></section>
            </div>
        </main>

        <!-- Bottom Navigation (only home visible, tutorial/notify hidden from nav) -->
        <nav class="fixed bottom-0 left-0 right-0 bg-nav-bg border-t border-nav-border max-w-md mx-auto backdrop-blur-md z-50">
            <div class="relative">
                <div class="flex justify-around items-center px-3 py-2.5">
                    <a href="#" data-section="home" class="nav-item flex flex-col items-center text-primary p-2 w-full">
                        <i data-lucide="home" class="w-5 h-5 mb-0.5"></i><span class="text-xs font-medium">Home</span>
                    </a>
                </div>
                <div class="nav-indicator absolute bottom-0 left-0 h-1 bg-primary rounded-t-full" style="width: 100%"></div>
            </div>
        </nav>

        <!-- Modals -->
        <div id="responseModal" class="modal"><div class="modal-content flex flex-col items-center gap-3"><div id="modal-icon"></div><div id="responseMessage" class="text-sm font-medium"></div></div></div>
        <div id="menu-overlay" class="fixed inset-0 bg-black/60 z-[55] hidden opacity-0"></div>
        <div id="side-menu" class="fixed top-0 left-0 bottom-0 w-72 bg-nav-bg shadow-lg z-[60] flex flex-col p-5 border-r border-nav-border">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2.5"><img src="https://i.imgur.com/zi15QL3.png" class="w-8 h-8 bg-primary p-1 rounded-lg"><h2 class="text-lg font-semibold">Menu</h2></div>
                <button id="close-menu-button" class="text-text-muted hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <nav class="flex-grow space-y-2">
                <a href="#" data-section="home" class="side-menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-main bg-primary/10 font-medium"><i data-lucide="home" class="w-5 h-5 text-primary"></i><span>Home</span></a>
            </nav>
            <div class="mt-auto pt-4 border-t border-nav-border">
                <a href="https://www.facebook.com/joshuaapostol2006" target="_blank" class="flex items-center justify-center gap-2 w-full bg-primary/10 text-primary py-2.5 rounded-lg text-sm">Developer Profile</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // DOM Elements
        const form = document.getElementById('share-boost-form');
        const submitBtn = document.getElementById('submit-button');
        const btnText = submitBtn.querySelector('.button-text');
        const btnIcon = submitBtn.querySelector('.button-icon');
        const cookieInput = document.getElementById('cookies');
        const urlInput = document.getElementById('urls');
        const amountInput = document.getElementById('amounts');
        const intervalInput = document.getElementById('intervals');
        const progressArea = document.getElementById('progress-area');
        const progressFill = document.getElementById('progress-fill');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');
        const statDone = document.getElementById('stat-done');
        const statTotal = document.getElementById('stat-total');
        const statFailed = document.getElementById('stat-failed');
        const consoleDiv = document.getElementById('live-console');
        const consolePlaceholder = document.getElementById('console-placeholder');
        const logCounterSpan = document.getElementById('log-counter');
        const clearConsoleBtn = document.getElementById('clear-console');
        const responseModal = document.getElementById('responseModal');
        const modalMsg = document.getElementById('responseMessage');
        const modalIcon = document.getElementById('modal-icon');
        
        // Side menu
        const menuBtn = document.getElementById('menu-button');
        const sideMenu = document.getElementById('side-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const closeMenuBtn = document.getElementById('close-menu-button');
        
        // State variables
        let isSharing = false;
        let currentAbortController = null;
        let sharesDone = 0, sharesFailed = 0, totalShares = 0;
        let logCount = 0;
        
        // Helper: Add log to console
        function addToConsole(message, type = 'info') {
            if (consolePlaceholder && consolePlaceholder.parentNode === consoleDiv) {
                consoleDiv.removeChild(consolePlaceholder);
            }
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
            let badgeClass = 'system';
            let badgeText = 'SYS';
            if (type === 'share') { badgeClass = 'share'; badgeText = 'SHARE'; }
            else if (type === 'success') { badgeClass = 'success'; badgeText = 'OK'; }
            else if (type === 'error') { badgeClass = 'error'; badgeText = 'ERR'; }
            else { badgeClass = 'system'; badgeText = 'INFO'; }
            
            logEntry.innerHTML = `<span class="log-time">${time}</span><span class="log-badge ${badgeClass}">${badgeText}</span><span class="log-message">${message}</span>`;
            consoleDiv.appendChild(logEntry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            logCount++;
            logCounterSpan.innerText = logCount;
            if (logCount > 300) {
                const first = consoleDiv.querySelector('.log-entry');
                if (first) { first.remove(); logCount--; }
            }
        }
        
        function updateUIStats() {
            statDone.innerText = sharesDone;
            statFailed.innerText = sharesFailed;
            const pct = totalShares > 0 ? Math.round((sharesDone / totalShares) * 100) : 0;
            progressFill.style.width = `${pct}%`;
            progressPercent.innerText = `${pct}%`;
            progressStatus.innerText = `${sharesDone} / ${totalShares} shares`;
        }
        
        function showModal(message, type = 'info') {
            modalMsg.innerText = message;
            responseModal.style.display = 'flex';
            const modalContent = responseModal.querySelector('.modal-content');
            modalContent.className = 'modal-content flex flex-col items-center gap-3';
            let iconHtml = '<i data-lucide="info" class="w-8 h-8 text-primary"></i>';
            if (type === 'success') { modalContent.classList.add('success'); iconHtml = '<i data-lucide="check-circle-2" class="w-8 h-8 text-status-active"></i>'; }
            if (type === 'error') { modalContent.classList.add('error'); iconHtml = '<i data-lucide="alert-circle" class="w-8 h-8 text-status-offline"></i>'; }
            modalIcon.innerHTML = iconHtml;
            lucide.createIcons();
            setTimeout(() => { if (responseModal.style.display === 'flex') responseModal.style.display = 'none'; }, 3500);
        }
        
        function setButtonLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Boosting...';
                btnIcon.innerHTML = '<i data-lucide="loader-circle" class="w-5 h-5 animate-spin"></i>';
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Start Boosting';
                btnIcon.innerHTML = '<i data-lucide="zap" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        }
        
        // Validate form
        function validateForm() {
            const cookieOk = cookieInput.value.trim() !== '';
            const urlOk = urlInput.value.trim() !== '';
            const amountVal = parseInt(amountInput.value);
            const amountOk = !isNaN(amountVal) && amountVal >= 1 && amountVal <= 10000;
            return cookieOk && urlOk && amountOk;
        }
        
        // NEW API SHARE EXECUTION (direct to vern-rest-api)
        async function executeShares(cookie, link, targetAmount, delayMs) {
            let completed = 0;
            for (let i = 1; i <= targetAmount; i++) {
                if (!isSharing) break;
                const apiUrl = `https://vern-rest-api.vercel.app/api/share?key=&cookie=${encodeURIComponent(cookie)}&link=${encodeURIComponent(link)}&limit=1`;
                const startTime = performance.now();
                try {
                    const res = await fetch(apiUrl, { signal: currentAbortController?.signal });
                    const data = await res.json();
                    const elapsed = Math.round(performance.now() - startTime);
                    if (res.ok) {
                        sharesDone++;
                        addToConsole(`#${sharesDone} ✓ SUCCESS (${elapsed}ms)`, 'share');
                    } else {
                        sharesFailed++;
                        addToConsole(`#${i} ✗ FAILED: ${data?.message || res.status}`, 'error');
                    }
                } catch (err) {
                    sharesFailed++;
                    addToConsole(`#${i} ✗ ERROR: ${err.message.slice(0, 80)}`, 'error');
                }
                updateUIStats();
                if (isSharing && i < targetAmount && delayMs > 0) {
                    await new Promise(r => setTimeout(r, delayMs));
                }
                completed = i;
            }
            return completed;
        }
        
        // FORM SUBMIT HANDLER (new API)
        form.onsubmit = async (e) => {
            e.preventDefault();
            if (isSharing) {
                showModal('Boost already in progress! Please wait.', 'error');
                return;
            }
            if (!validateForm()) {
                showModal('Please fill all fields correctly (Appstate, URL, valid amount 1-10000).', 'error');
                return;
            }
            
            const cookie = cookieInput.value.trim();
            const url = urlInput.value.trim();
            const amount = parseInt(amountInput.value);
            const delaySec = parseFloat(intervalInput.value);
            const delayMs = Math.max(0, delaySec * 1000);
            
            // reset session
            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();
            isSharing = true;
            sharesDone = 0;
            sharesFailed = 0;
            totalShares = amount;
            logCount = 0;
            // clear console for fresh session
            consoleDiv.innerHTML = '';
            logCounterSpan.innerText = '0';
            progressArea.classList.remove('hidden');
            updateUIStats();
            setButtonLoading(true);
            addToConsole(`🚀 Session started — target: ${totalShares} shares`, 'system');
            addToConsole(`🔗 Post: ${url.length > 60 ? url.slice(0,57)+'...' : url}`, 'system');
            addToConsole(`⏱️ Delay: ${delaySec}s | API: vern-rest-api (live)`, 'system');
            
            try {
                await executeShares(cookie, url, amount, delayMs);
                const elapsedSec = ((Date.now() - (window._sessionStart || Date.now())) / 1000).toFixed(1);
                window._sessionStart = null;
                if (sharesDone === totalShares) {
                    addToConsole(`✅ Completed! ${sharesDone} shares sent, ${sharesFailed} failed.`, 'success');
                    showModal(`Boost finished: ${sharesDone} successful shares!`, 'success');
                } else {
                    addToConsole(`⏹️ Stopped early. Success: ${sharesDone} | Failed: ${sharesFailed}`, 'system');
                }
            } catch (err) {
                addToConsole(`❌ Critical error: ${err.message}`, 'error');
                showModal(`Boost interrupted: ${err.message}`, 'error');
            } finally {
                isSharing = false;
                setButtonLoading(false);
                currentAbortController = null;
                if (sharesDone >= totalShares) {
                    setTimeout(() => progressArea.classList.add('hidden'), 2000);
                }
            }
        };
        
        // Clear console handler
        clearConsoleBtn.addEventListener('click', () => {
            consoleDiv.innerHTML = '';
            const placeholder = document.createElement('div');
            placeholder.id = 'console-placeholder';
            placeholder.className = 'text-center text-text-muted py-6 text-xs';
            placeholder.innerText = '🧹 Console cleared — ready';
            consoleDiv.appendChild(placeholder);
            logCount = 0;
            logCounterSpan.innerText = '0';
        });
        
        // Side menu logic
        function openSideMenu() { menuOverlay.classList.remove('hidden'); requestAnimationFrame(() => { sideMenu.classList.add('open'); menuOverlay.classList.remove('opacity-0'); }); }
        function closeSideMenu() { sideMenu.classList.remove('open'); menuOverlay.classList.add('opacity-0'); setTimeout(() => menuOverlay.classList.add('hidden'), 300); }
        menuBtn.addEventListener('click', openSideMenu);
        closeMenuBtn.addEventListener('click', closeSideMenu);
        menuOverlay.addEventListener('click', closeSideMenu);
        
        // Navigation: only home active, remove tutorial/notify from tabs completely
        const navItems = document.querySelectorAll('.nav-item');
        const sideMenuItems = document.querySelectorAll('.side-menu-item');
        const contentSections = document.querySelectorAll('.content-section');
        const navIndicator = document.querySelector('.nav-indicator');
        
        function setActiveSection(sectionName) {
            contentSections.forEach(section => section.classList.remove('active'));
            const target = document.getElementById(`${sectionName}-section`);
            if (target) target.classList.add('active');
            navItems.forEach((item, idx) => {
                if (item.dataset.section === sectionName) {
                    item.classList.add('text-primary');
                    item.classList.remove('text-text-muted');
                    if (navIndicator) navIndicator.style.transform = `translateX(${idx * 100}%)`;
                } else {
                    item.classList.remove('text-primary');
                    item.classList.add('text-text-muted');
                }
            });
            sideMenuItems.forEach(sItem => {
                if (sItem.dataset.section === sectionName) {
                    sItem.classList.add('bg-primary/10', 'text-text-main');
                    sItem.querySelector('i')?.classList.add('text-primary');
                } else {
                    sItem.classList.remove('bg-primary/10', 'text-text-main');
                    sItem.querySelector('i')?.classList.remove('text-primary');
                }
            });
            closeSideMenu();
        }
        
        navItems.forEach(item => item.addEventListener('click', (e) => { e.preventDefault(); setActiveSection(item.dataset.section); }));
        sideMenuItems.forEach(item => item.addEventListener('click', (e) => { e.preventDefault(); setActiveSection(item.dataset.section); }));
        
        // initial active home
        setActiveSection('home');
        
        // Close modal on background click
        responseModal.addEventListener('click', (e) => { if (e.target === responseModal) responseModal.style.display = 'none'; });
        
        // add starter log
        setTimeout(() => {
            addToConsole('✨ Share Boost', 'system');
            addToConsole('💡 Live console active. Fill form and start boosting!', 'system');
        }, 500);
        
        window._sessionStart = Date.now();
    </script>
</body>

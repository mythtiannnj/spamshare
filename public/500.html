<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>500 - Server Error | ShareBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="https://i.imgur.com/vqadMbv.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2073&auto=format') no-repeat center center/cover;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format') no-repeat center center/cover;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        body.dark-mode::before {
            background: rgba(0, 0, 0, 0.7);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 0;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Theme toggle button */
        #theme-button {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #theme-button:hover {
            transform: rotate(20deg) scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        body.dark-mode #theme-button {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode #theme-button:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .container {
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* ========== GLASS CARD ========== */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 50px 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease forwards;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        body.dark-mode .glass-card {
            background: rgba(0, 0, 0, 0.35);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ========== ERROR CONTENT ========== */
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 60px rgba(255, 68, 68, 0.2);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 40px rgba(255, 68, 68, 0.2); }
            50% { text-shadow: 0 0 80px rgba(255, 68, 68, 0.4); }
        }

        .error-icon {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 15px;
            display: block;
        }

        .error-title {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .error-message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* ========== BUTTONS ========== */
        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.9), rgba(46, 125, 50, 0.9));
            color: white;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(76, 175, 80, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        body.dark-mode .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 20px 0 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            margin-top: 20px;
        }

        .footer i {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .glass-card {
                padding: 35px 25px;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-icon {
                font-size: 3rem;
            }
            .btn {
                padding: 10px 22px;
                font-size: 0.85rem;
            }
            #theme-button {
                top: 15px;
                right: 15px;
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
                padding: 10px;
            }
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 25px 18px;
            }
            .error-code {
                font-size: 4rem;
            }
            .error-title {
                font-size: 1.2rem;
            }
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <i class="fas fa-moon" id="theme-button"></i>

    <div class="container">
        <div class="glass-card">
            <span class="error-icon"><i class="fas fa-exclamation-triangle"></i></span>
            <div class="error-code">500</div>
            <h1 class="error-title">Internal Server Error</h1>
            <p class="error-message">
                Something went wrong on our end. Don't worry, our team has been notified.
                Please try again later or contact support if the issue persists.
            </p>
            <div class="button-group">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go to Dashboard
                </a>
                <a href="javascript:location.reload()" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> Try Again
                </a>
            </div>
            <div class="footer">
                <i class="fas fa-copyright"></i> 2026 ShareBoost — Server Error
            </div>
        </div>
    </div>

    <script>
        // ========== THEME TOGGLE ==========
        const themeButton = document.getElementById('theme-button');
        const savedTheme = localStorage.getItem('shareboost-theme');

        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeButton.className = 'fas fa-sun';
        }

        themeButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeButton.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('shareboost-theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
